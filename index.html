<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Calamus AI 포털</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: radial-gradient(circle at top, #1c2333, #0b0f17);
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    header p {
      opacity: 0.85;
      font-size: 1rem;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .service-card {
      background: linear-gradient(180deg, #171e2b, #121826);
      border-radius: 18px;
      padding: 24px;
      text-decoration: none;
      color: #fff;
      transition: transform .25s ease, box-shadow .25s ease;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      position: relative;
      overflow: hidden;
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(0,0,0,.5);
    }

    .service-card.disabled {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    .icon {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 0.9rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    .badge {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 0.7rem;
      background: #facc15;
      color: #111;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    footer {
      margin-top: 64px;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <h1>Calamus AI</h1>
    <p>일상과 선택을 돕는 작은 AI 서비스 모음</p>
  </header>

  <section class="service-grid">

    <!-- 사주 -->
    <a href="https://saju.calamus.ai.kr" class="service-card">
      <div class="icon">🔮</div>
      <div class="title">사주 보기</div>
      <div class="desc">
        명리학·주역·성명학을 종합한<br>
        인생 흐름과 운세 분석
      </div>
    </a>

    <!-- 타로 -->
    <a href="https://tarot.calamus.ai.kr" class="service-card">
      <div class="icon">🃏</div>
      <div class="title">타로 점보기</div>
      <div class="desc">
        오늘의 선택과 고민을 위한<br>
        직관적 타로 상담
      </div>
    </a>

    <!-- 사다리 -->
    <a href="https://ladder.calamus.ai.kr" class="service-card">
      <div class="icon">🪜</div>
      <div class="title">사다리 게임</div>
      <div class="desc">
        당번·벌칙·추첨용<br>
        간편 사다리 게임
      </div>
    </a>

    <!-- 준비중 -->
    <div class="service-card disabled">
      <span class="badge">준비중</span>
      <div class="icon">🌙</div>
      <div class="title">해몽</div>
      <div class="desc">
        꿈의 상징과 의미를 해석하는<br>
        AI 해몽 서비스
      </div>
    </div>

    <div class="service-card disabled">
      <span class="badge">준비중</span>
      <div class="icon">🧿</div>
      <div class="title">이름 풀이</div>
      <div class="desc">
        이름의 음·한자·오행 조화 분석
      </div>
    </div>

  </section>

  <footer>
    © 2025 Calamus AI · 본 서비스는 참고용입니다.
  </footer>

</div>

</body>
</html>
